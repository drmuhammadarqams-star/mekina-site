<script>
gsap.registerPlugin(ScrollTrigger);

function prepPaths(svgId) {
  const paths = document.querySelectorAll(`#${svgId} .dp`);
  paths.forEach(p => {
    const len = p.getTotalLength ? p.getTotalLength() : 600;
    p.style.strokeDasharray  = len;
    p.style.strokeDashoffset = len;
  });
  return paths;
}

/* TEXT ANNOTATIONS — INSTANT FADE (NO SCRUB) */
function setupTextTriggers(sectionId, earlyClass, lateClass) {
  ScrollTrigger.create({
    trigger: sectionId,
    start: 'top 90%',
    onEnter: () => {
      gsap.to(earlyClass, {
        opacity: 0.7, duration: 0.8, ease: 'power2.out', stagger: 0.12
      });
    },
    onLeaveBack: () => {
      gsap.to(earlyClass, { opacity: 0, duration: 0.4 });
    }
  });

  ScrollTrigger.create({
    trigger: sectionId,
    start: 'top 30%',
    onEnter: () => {
      gsap.to(lateClass, {
        opacity: 0.6, duration: 0.8, ease: 'power2.out', stagger: 0.12
      });
    },
    onLeaveBack: () => {
      gsap.to(lateClass, { opacity: 0, duration: 0.4 });
    }
  });
}

/* SCRUBBED DRAWINGS — paths only */
function buildSceneDrawing(sectionId, svgId, anchorId, order) {
  prepPaths(svgId);
  const tl = gsap.timeline({
    scrollTrigger: {
      trigger: sectionId,
      start: 'top 80%',
      end: 'bottom 30%',
      scrub: 1.2
    }
  });

  order.forEach(group => {
    group.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      tl.to(el, { strokeDashoffset: 0, ease: 'none', duration: 0.6 }, '<0.15');
    });
    tl.to({}, { duration: 0.2 });
  });

  tl.to(anchorId, { opacity: 1, y: 0, duration: 1 }, "-=0.8");
}

  setupTextTriggers('#s1', '.mn1-early', '.mn1-late');
  buildSceneDrawing('#s1', 'svg1', '#anchor1', [
